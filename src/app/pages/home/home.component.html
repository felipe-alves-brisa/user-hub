<div style="padding: 24px;">
  <h2>Bem-vindo ao User Hub</h2>
  <p>Gerencie usuários e visualize suas postagens.</p>
  
  <div style="display: flex; gap: 16px; margin-top: 24px;">
    <ion-button 
      label="Ver Usuários" 
      type="primary" 
      (ionOnClick)="navigateToUsers()">
    </ion-button>
    <ion-button 
      label="Adicionar Usuário" 
      type="secondary" 
      (ionOnClick)="navigateToAddUser()">
    </ion-button>
  </div>
</div>
